apis:
  - aid: live-nation-entertainment:ticketmaster-discovery-api
    name: Ticketmaster Discovery API
    tags:
      - Events
      - Ticketing
      - Venues
      - Attractions
    image: 
      https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://app.ticketmaster.com/discovery/v2
    humanURL: https://developer.ticketmaster.com/
    properties:
      - url: 
          https://developer.ticketmaster.com/products-and-docs/apis/discovery-api/v2/
        type: Documentation
      - url: 
          openapi/live-nation-entertainment-ticketmaster-discovery-api-openapi.yml
        type: OpenAPI
    description: >-
      The Ticketmaster Discovery API allows developers to search for events, attractions,
      venues, and classifications across all Ticketmaster supported sources, markets,
      and locales. The API provides access to content from Ticketmaster, Universe,
      FrontGate Tickets, and Ticketmaster Resale platforms with a default quota of
      5000 API calls per day and rate limitation of 5 requests per second.
