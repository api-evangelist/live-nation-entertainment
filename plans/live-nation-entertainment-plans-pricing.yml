specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Live Nation Entertainment
providerId: live-nation-entertainment
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Attractions
  - Events
  - Ticketing
  - Venues
description: Live Nation / Ticketmaster operates an open developer network at developer.ticketmaster.com.
  The Ticketmaster Discovery API is classified as an "Open API" — all authenticated developers receive
  the same default quotas (5,000 calls/day, 5 req/sec) at no charge. Higher quotas and partner / affiliate
  / Partner API access are evaluated case-by-case after compliance and branding review; commercial revenue
  flows through ticket sales and affiliate programs, not API metering.
sources:
  - https://developer.ticketmaster.com/products-and-docs/apis/getting-started/
  - https://developer.ticketmaster.com/
plans:
  - id: live-nation-entertainment-discovery-default
    name: Discovery API — Default (Open)
    type: freemium
    description: Free, self-serve access to the Ticketmaster Discovery API for any registered developer.
      Default quota of 5,000 calls/day at 5 requests/second across Ticketmaster, Universe, FrontGate
      Tickets, and Ticketmaster Resale content.
    entries:
      - label: Daily quota
        name: daily_quota
        type: quota
        metric: request
        limit: 5000
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Throughput
        name: throughput
        type: metered
        metric: requests_per_second
        limit: 5
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Discovery API access
      - name: Events / attractions / venues / classifications search
      - name: Ticketmaster, Universe, FrontGate, Resale content
      - name: Self-serve API key
  - id: live-nation-entertainment-discovery-extended
    name: Discovery API — Extended Quota
    type: enterprise
    description: Quota increases on the Discovery API are granted case-by-case after Ticketmaster verifies
      compliance with Terms of Service, branding guidelines, and proper representation of Ticketmaster
      data. No published per-call pricing; access remains free of charge.
    entries:
      - label: Daily quota (negotiated)
        name: daily_quota
        type: quota
        metric: request
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Higher daily quota
      - name: Compliance review required
      - name: Branding guideline adherence
  - id: live-nation-entertainment-affiliate
    name: Affiliate / Partner Program
    type: enterprise
    description: Commercial relationship for ticket-driving partners (publishers, fan sites, integrators).
      Revenue is share of ticket sales referred via the Discovery + Commerce APIs, not API call fees.
    entries:
      - label: Affiliate revenue share
        name: affiliate_share
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact provider
        userMultiplied: false
    elements:
      - name: Affiliate / partner program access
      - name: Commerce flows (where granted)
      - name: Revenue share on referred ticket sales
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
