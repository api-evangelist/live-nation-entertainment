specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Live Nation Entertainment
providerId: live-nation-entertainment
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Ticketing
  - Events
  - Venues
description: The Ticketmaster Discovery API enforces a default per-API-key quota of 5,000 calls per day
  and a throughput cap of 5 requests per second. Quota usage is surfaced via custom Rate-Limit-* response
  headers. Quota violations return HTTP 429 with the message "Rate limit quota violation. Quota limit
  exceeded." Higher quotas are granted case-by-case after Ticketmaster verifies ToS compliance, branding,
  and proper representation of Ticketmaster data.
sources:
  - https://developer.ticketmaster.com/products-and-docs/apis/getting-started/
  - https://developer.ticketmaster.com/support/faq/
headers:
  limit: Rate-Limit
  remaining: Rate-Limit-Available
  over: Rate-Limit-Over
  reset: Rate-Limit-Reset
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Discovery API daily quota
    scope: api-key
    metric: requests_per_day
    limit: 5000
    timeFrame: day
    notes: Default quota for new API keys. Reset time surfaced via Rate-Limit-Reset (UTC).
  - name: Discovery API throughput
    scope: api-key
    metric: requests_per_second
    limit: 5
    timeFrame: second
    notes: Steady-state throughput cap on the Discovery API.
policies:
  - name: Quota increases via partner review
    description: Higher daily quotas are granted case-by-case after Ticketmaster verifies (1) Terms of
      Service compliance, (2) branding-guideline adherence, and (3) proper representation of Ticketmaster
      data.
  - name: Rate-Limit headers
    description: Every response includes Rate-Limit (total quota), Rate-Limit-Available (remaining),
      Rate-Limit-Over (over-quota count), and Rate-Limit-Reset (UTC reset timestamp).
  - name: 429 handling
    description: When quota is exceeded, the API returns HTTP 429 with body "Rate limit quota violation.
      Quota limit exceeded." Backoff until the Rate-Limit-Reset timestamp.
  - name: Backoff Strategy
    description: Use exponential backoff with jitter for 5xx and unexpected 429s; for explicit quota
      exceedance, wait for the Rate-Limit-Reset timestamp.
