openapi: 3.1.0
info:
  title: Ticketmaster Discovery Attractions Classifications API
  description: The Ticketmaster Discovery API allows developers to search for events, attractions, venues, and classifications across all Ticketmaster supported sources, markets, and locales. The API provides access to content from Ticketmaster, Universe, FrontGate Tickets, and Ticketmaster Resale platforms.
  version: '2.0'
servers:
- url: https://app.ticketmaster.com/discovery/v2
tags:
- name: Classifications
  description: Search and retrieve classification/genre information.
paths:
  /classifications.json:
    get:
      operationId: searchClassifications
      summary: Search classifications
      description: Find classifications (segments, genres, sub-genres) and filter by keyword.
      tags:
      - Classifications
      parameters:
      - name: apikey
        in: query
        required: true
        description: API key for authentication.
        schema:
          type: string
      - name: keyword
        in: query
        description: Keyword to search on.
        schema:
          type: string
      - name: size
        in: query
        description: Page size of the response.
        schema:
          type: integer
      responses:
        '200':
          description: Success
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: query
      name: apikey
