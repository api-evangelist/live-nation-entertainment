naftiko: 1.0.0-alpha2
info:
  label: Ticketmaster Discovery API
  description: The Ticketmaster Discovery API allows developers to search for events, attractions, venues, and classifications
    across all Ticketmaster supported sources, markets, and locales. The API provides access to content from Ticketmaster,
    Universe, FrontGate Tickets, and Ticketmaster Resale platforms.
  tags:
  - Live
  - Nation
  - Entertainment
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: live-nation-entertainment
    baseUri: https://app.ticketmaster.com/discovery/v2
    description: Ticketmaster Discovery API HTTP API.
    authentication:
      type: apikey
      in: query
      name: apikey
      value: '{{LIVE_NATION_ENTERTAINMENT_TOKEN}}'
    resources:
    - name: events-json
      path: /events.json
      operations:
      - name: searchevents
        method: GET
        description: Search events
        inputParameters:
        - name: apikey
          in: query
          type: string
          required: true
          description: API key for authentication.
        - name: keyword
          in: query
          type: string
          description: Keyword to search on.
        - name: city
          in: query
          type: string
          description: Filter by city name.
        - name: stateCode
          in: query
          type: string
          description: Filter by state code.
        - name: countryCode
          in: query
          type: string
          description: Filter by country code.
        - name: startDateTime
          in: query
          type: string
          description: Filter events starting after this date/time.
        - name: endDateTime
          in: query
          type: string
          description: Filter events starting before this date/time.
        - name: size
          in: query
          type: integer
          description: Page size of the response.
        - name: page
          in: query
          type: integer
          description: Page number.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: events-id-json
      path: /events/{id}.json
      operations:
      - name: geteventdetails
        method: GET
        description: Get event details
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Event identifier.
        - name: apikey
          in: query
          type: string
          required: true
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: attractions-json
      path: /attractions.json
      operations:
      - name: searchattractions
        method: GET
        description: Search attractions
        inputParameters:
        - name: apikey
          in: query
          type: string
          required: true
          description: API key for authentication.
        - name: keyword
          in: query
          type: string
          description: Keyword to search on.
        - name: size
          in: query
          type: integer
          description: Page size of the response.
        - name: page
          in: query
          type: integer
          description: Page number.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: attractions-id-json
      path: /attractions/{id}.json
      operations:
      - name: getattractiondetails
        method: GET
        description: Get attraction details
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Attraction identifier.
        - name: apikey
          in: query
          type: string
          required: true
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: venues-json
      path: /venues.json
      operations:
      - name: searchvenues
        method: GET
        description: Search venues
        inputParameters:
        - name: apikey
          in: query
          type: string
          required: true
          description: API key for authentication.
        - name: keyword
          in: query
          type: string
          description: Keyword to search on.
        - name: city
          in: query
          type: string
          description: Filter by city name.
        - name: stateCode
          in: query
          type: string
          description: Filter by state code.
        - name: countryCode
          in: query
          type: string
          description: Filter by country code.
        - name: size
          in: query
          type: integer
          description: Page size of the response.
        - name: page
          in: query
          type: integer
          description: Page number.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: venues-id-json
      path: /venues/{id}.json
      operations:
      - name: getvenuedetails
        method: GET
        description: Get venue details
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Venue identifier.
        - name: apikey
          in: query
          type: string
          required: true
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: classifications-json
      path: /classifications.json
      operations:
      - name: searchclassifications
        method: GET
        description: Search classifications
        inputParameters:
        - name: apikey
          in: query
          type: string
          required: true
          description: API key for authentication.
        - name: keyword
          in: query
          type: string
          description: Keyword to search on.
        - name: size
          in: query
          type: integer
          description: Page size of the response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: live-nation-entertainment-rest
    description: REST adapter for Ticketmaster Discovery API.
    resources:
    - path: /events.json
      name: searchevents
      operations:
      - method: GET
        name: searchevents
        description: Search events
        call: live-nation-entertainment.searchevents
        outputParameters:
        - type: object
          mapping: $.
    - path: /events/{id}.json
      name: geteventdetails
      operations:
      - method: GET
        name: geteventdetails
        description: Get event details
        call: live-nation-entertainment.geteventdetails
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /attractions.json
      name: searchattractions
      operations:
      - method: GET
        name: searchattractions
        description: Search attractions
        call: live-nation-entertainment.searchattractions
        outputParameters:
        - type: object
          mapping: $.
    - path: /attractions/{id}.json
      name: getattractiondetails
      operations:
      - method: GET
        name: getattractiondetails
        description: Get attraction details
        call: live-nation-entertainment.getattractiondetails
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /venues.json
      name: searchvenues
      operations:
      - method: GET
        name: searchvenues
        description: Search venues
        call: live-nation-entertainment.searchvenues
        outputParameters:
        - type: object
          mapping: $.
    - path: /venues/{id}.json
      name: getvenuedetails
      operations:
      - method: GET
        name: getvenuedetails
        description: Get venue details
        call: live-nation-entertainment.getvenuedetails
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /classifications.json
      name: searchclassifications
      operations:
      - method: GET
        name: searchclassifications
        description: Search classifications
        call: live-nation-entertainment.searchclassifications
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: live-nation-entertainment-mcp
    transport: http
    description: MCP adapter for Ticketmaster Discovery API for AI agent use.
    tools:
    - name: searchevents
      description: Search events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: live-nation-entertainment.searchevents
      with:
        apikey: tools.apikey
        keyword: tools.keyword
        city: tools.city
        stateCode: tools.stateCode
        countryCode: tools.countryCode
        startDateTime: tools.startDateTime
        endDateTime: tools.endDateTime
        size: tools.size
        page: tools.page
      inputParameters:
      - name: apikey
        type: string
        description: API key for authentication.
        required: true
      - name: keyword
        type: string
        description: Keyword to search on.
      - name: city
        type: string
        description: Filter by city name.
      - name: stateCode
        type: string
        description: Filter by state code.
      - name: countryCode
        type: string
        description: Filter by country code.
      - name: startDateTime
        type: string
        description: Filter events starting after this date/time.
      - name: endDateTime
        type: string
        description: Filter events starting before this date/time.
      - name: size
        type: integer
        description: Page size of the response.
      - name: page
        type: integer
        description: Page number.
      outputParameters:
      - type: object
        mapping: $.
    - name: geteventdetails
      description: Get event details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: live-nation-entertainment.geteventdetails
      with:
        id: tools.id
        apikey: tools.apikey
      inputParameters:
      - name: id
        type: string
        description: Event identifier.
        required: true
      - name: apikey
        type: string
        description: API key for authentication.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: searchattractions
      description: Search attractions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: live-nation-entertainment.searchattractions
      with:
        apikey: tools.apikey
        keyword: tools.keyword
        size: tools.size
        page: tools.page
      inputParameters:
      - name: apikey
        type: string
        description: API key for authentication.
        required: true
      - name: keyword
        type: string
        description: Keyword to search on.
      - name: size
        type: integer
        description: Page size of the response.
      - name: page
        type: integer
        description: Page number.
      outputParameters:
      - type: object
        mapping: $.
    - name: getattractiondetails
      description: Get attraction details
      hints:
        readOnly: true
