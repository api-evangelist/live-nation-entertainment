naftiko: 1.0.0-alpha2
info:
  label: Ticketmaster Discovery API — Venues
  description: 'Ticketmaster Discovery API — Venues. 2 operations. Lead operation: Search venues. Self-contained Naftiko capability
    covering one Live Nation Entertainment business surface.'
  tags:
  - Live Nation Entertainment
  - Venues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LIVE_NATION_ENTERTAINMENT_API_KEY: LIVE_NATION_ENTERTAINMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: ticketmaster-discovery-venues
    baseUri: https://app.ticketmaster.com/discovery/v2
    description: Ticketmaster Discovery API — Venues business capability. Self-contained, no shared references.
    resources:
    - name: venues.json
      path: /venues.json
      operations:
      - name: searchvenues
        method: GET
        description: Search venues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apikey
          in: query
          type: string
          description: API key for authentication.
          required: true
        - name: keyword
          in: query
          type: string
          description: Keyword to search on.
        - name: city
          in: query
          type: string
          description: Filter by city name.
        - name: stateCode
          in: query
          type: string
          description: Filter by state code.
        - name: countryCode
          in: query
          type: string
          description: Filter by country code.
        - name: size
          in: query
          type: integer
          description: Page size of the response.
        - name: page
          in: query
          type: integer
          description: Page number.
    - name: venues-id}.json
      path: /venues/{id}.json
      operations:
      - name: getvenuedetails
        method: GET
        description: Get venue details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Venue identifier.
          required: true
        - name: apikey
          in: query
          type: string
          description: API key for authentication.
          required: true
    authentication:
      type: apikey
      key: apikey
      value: '{{env.LIVE_NATION_ENTERTAINMENT_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: ticketmaster-discovery-venues-rest
    port: 8080
    description: REST adapter for Ticketmaster Discovery API — Venues. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/venues-json
      name: venues-json
      description: REST surface for venues.json.
      operations:
      - method: GET
        name: searchvenues
        description: Search venues
        call: ticketmaster-discovery-venues.searchvenues
        with:
          apikey: rest.apikey
          keyword: rest.keyword
          city: rest.city
          stateCode: rest.stateCode
          countryCode: rest.countryCode
          size: rest.size
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/venues/id-json
      name: venues-id-json
      description: REST surface for venues-id}.json.
      operations:
      - method: GET
        name: getvenuedetails
        description: Get venue details
        call: ticketmaster-discovery-venues.getvenuedetails
        with:
          id: rest.id
          apikey: rest.apikey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ticketmaster-discovery-venues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ticketmaster Discovery API — Venues. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-venues
      description: Search venues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketmaster-discovery-venues.searchvenues
      with:
        apikey: tools.apikey
        keyword: tools.keyword
        city: tools.city
        stateCode: tools.stateCode
        countryCode: tools.countryCode
        size: tools.size
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-venue-details
      description: Get venue details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketmaster-discovery-venues.getvenuedetails
      with:
        id: tools.id
        apikey: tools.apikey
      outputParameters:
      - type: object
        mapping: $.
