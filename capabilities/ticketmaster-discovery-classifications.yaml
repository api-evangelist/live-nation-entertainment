naftiko: 1.0.0-alpha2
info:
  label: Ticketmaster Discovery API — Classifications
  description: 'Ticketmaster Discovery API — Classifications. 1 operations. Lead operation: Search classifications. Self-contained
    Naftiko capability covering one Live Nation Entertainment business surface.'
  tags:
  - Live Nation Entertainment
  - Classifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LIVE_NATION_ENTERTAINMENT_API_KEY: LIVE_NATION_ENTERTAINMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: ticketmaster-discovery-classifications
    baseUri: https://app.ticketmaster.com/discovery/v2
    description: Ticketmaster Discovery API — Classifications business capability. Self-contained, no shared references.
    resources:
    - name: classifications.json
      path: /classifications.json
      operations:
      - name: searchclassifications
        method: GET
        description: Search classifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apikey
          in: query
          type: string
          description: API key for authentication.
          required: true
        - name: keyword
          in: query
          type: string
          description: Keyword to search on.
        - name: size
          in: query
          type: integer
          description: Page size of the response.
    authentication:
      type: apikey
      key: apikey
      value: '{{env.LIVE_NATION_ENTERTAINMENT_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: ticketmaster-discovery-classifications-rest
    port: 8080
    description: REST adapter for Ticketmaster Discovery API — Classifications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/classifications-json
      name: classifications-json
      description: REST surface for classifications.json.
      operations:
      - method: GET
        name: searchclassifications
        description: Search classifications
        call: ticketmaster-discovery-classifications.searchclassifications
        with:
          apikey: rest.apikey
          keyword: rest.keyword
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ticketmaster-discovery-classifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ticketmaster Discovery API — Classifications. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: search-classifications
      description: Search classifications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ticketmaster-discovery-classifications.searchclassifications
      with:
        apikey: tools.apikey
        keyword: tools.keyword
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
