specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Live Nation Entertainment
providerId: live-nation-entertainment
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Ticketing
  - Events
  - Venues
description: 'FOCUS-aligned FinOps for Live Nation / Ticketmaster: the public Discovery API is free
  with a 5,000 call/day, 5 req/sec quota, so direct API spend is zero. Commercial value flows through
  affiliate / partner ticket-sales revenue share rather than API fees. FinOps for consumers focuses
  on quota headroom (avoid 429s) and affiliate ROI rather than line-item API cost.'
sources:
  - https://developer.ticketmaster.com/products-and-docs/apis/getting-started/
  - https://developer.ticketmaster.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Live Nation Entertainment, Inc. / Ticketmaster L.L.C.
serviceCategory: Ticketing / Events
billingModel:
  pricingCategory: Free API + Affiliate Revenue Share
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Ticketmaster Discovery API
  ServiceCategory: Ticketing / Events
  ProviderName: Live Nation Entertainment
  PublisherName: Live Nation Entertainment, Inc.
  InvoiceIssuerName: Ticketmaster L.L.C.
  BillingCurrency: USD
meters:
  - name: discovery_api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - endpoint
      - market
      - locale
  - name: daily_quota_consumed
    unit: request
    aggregation: max
    dimensions:
      - api_key
  - name: affiliate_referrals
    unit: referral
    aggregation: sum
    dimensions:
      - partner
      - market
      - event_type
  - name: affiliate_revenue
    unit: USD
    aggregation: sum
    dimensions:
      - partner
      - market
      - event_type
principles:
  - name: Visibility
    description: Read Rate-Limit / Rate-Limit-Available / Rate-Limit-Reset response headers on every
      call; export them to your observability platform for headroom dashboards. Use the affiliate /
      partner reporting portal for revenue share.
  - name: Allocation
    description: Issue distinct API keys per integration / brand to attribute Discovery API consumption
      and to scope quota-increase requests; tag affiliate URLs with sub-IDs for revenue allocation.
  - name: Optimization
    description: Cache event / venue / classification results; use search filters and pagination to stay
      within 5,000/day; throttle clients to 5 req/sec with token-bucket; only request quota increases
      after compliance / branding review readiness.
  - name: Accountability
    description: Assign an integration owner who watches 429 rate and quota headroom, and a partner-program
      owner who reviews affiliate revenue against ticket-referral targets each month.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
